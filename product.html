<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تفاصيل المنتج</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      text-align: center;
    }
    img {
      width: 100%;
    }
    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="box">
  <img src="https://via.placeholder.com/300" alt="">
  <h2>منتج 1</h2>
  <p>هذا وصف بسيط للمنتج</p>
  <h3>السعر: 100 درهم</h3>
  <button>شراء</button>
</div>

</body>
