<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Shorts Morocco</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🔥 AI Shorts Morocco</header>

<!-- VIDEO PLAYER -->
<div class="player">
    <video id="videoPlayer" autoplay controls></video>
</div>

<!-- CONTROLS -->
<div class="controls">
    <button onclick="prevVideo()">⬅</button>
    <button onclick="nextVideo()">➡</button>
</div>

<!-- ADD VIDEO -->
<div class="add">
    <input id="title" placeholder="Video title">
    <input id="url" placeholder="Video mp4 link">
    <button onclick="addVideo()">Add</button>
</div>

<script src="script.js"></script>
</body>
</html>
